# ==========================================
# ENLA 2026 Callao - dbt Source Definitions
# Sprint 6: dbt Transformations for Looker Studio
# ==========================================
# 
# NOTE: This project uses a HYBRID approach:
# - Python ETL (src/etl/transform.py): Handles data ingestion (Excel → MongoDB → BigQuery)
# - Python Feature Engineering (src/features/engineer.py): Creates enla_callao_features
# - Python ML Predictions (src/models/predictor.py): Creates enla_callao_predictions_2026
# - dbt: Creates presentation-layer views for Looker Studio dashboards
#
# Actual Data Schema (from Excel):
# - Raw data columns: M500_EM_2S_2023_CT, M500_EM_2S_2023_MA, M500_EM_2S_2023_CS
#   (lectura/comunicacion, matematica, ccss - NO CyT data exists)
# - "area" column = geographic zone (Rural/Urban), NOT academic area
# - Academic areas derived: comunicacion, matematica, ccss (3 areas only, no cyt)
# ==========================================

version: 2

sources:
  - name: enla_raw
    description: "Raw data sources for ENLA 2026 Callao project"
    database: "{{ env_var('BQ_PROJECT', 'enla-2026-callao') }}"
    schema: "{{ env_var('DBT_DATASET_ID', 'BI_ENLA') }}"

    tables:
      - name: enla_callao_raw
        description: >
          Raw data ingested from MongoDB.
          NOTE: 'area' column = geographic zone (Rural/Urban), NOT academic area.
          Academic areas are derived from EMA 2023 columns: M500_EM_2S_2023_CT/MA/CS
        columns:
          - name: id_ie
            description: "Institution ID"
            tests:
              - not_null
          - name: area
            description: "Geographic zone: 'Rural' or 'Urban' (NOT academic area)"
          - name: M500_EM_2S_2023_CT
            description: "Lecture/Comunicación score (EMA 2023)"
          - name: M500_EM_2S_2023_MA
            description: "Matemática score (EMA 2023)"
          - name: M500_EM_2S_2023_CS
            description: "Ciencias Sociales score (EMA 2023)"
          # NOTE: No CyT (Ciencia y Tecnología) data exists in the current Excel file

      - name: fact_enla
        description: >
          Fact table with one row per student per academic area per year.
          Created by Python ETL (src/etl/transform.py).
          Academic areas: comunicacion, matematica, ccss (NO cyt)
        columns:
          - name: id_ie
            tests:
              - not_null
          - name: area_academica
            description: "Academic area: comunicacion, matematica, ccss"
            tests:
              - not_null
              - accepted_values:
                  values: ['comunicacion', 'matematica', 'ccss']
          - name: cor_est
            description: "Student identifier"
          - name: score
            description: "Student score [0, 100]"

      - name: enla_callao_features
        description: >
          Feature engineering output table created by Python (src/features/engineer.py).
          Contains aggregated features per institution per academic area:
          avg_score_2023, avg_score_2022, avg_score_2021, trend, variance, target.
          Academic areas: comunicacion, matematica, ccss (NO cyt)
        columns:
          - name: institution_id
            description: "Institution ID"
            tests:
              - not_null
          - name: area
            description: "Academic area: comunicacion, matematica, ccss"
            tests:
              - not_null
          - name: avg_score_2023
            description: "Average score for 2023"
          - name: trend
            description: "Score trend over time"

      - name: enla_callao_predictions_2026
        description: >
          ML predictions output table created by Python (src/models/predictor.py).
          Contains predictions for 2026: risk_level, confidence, predicted_success.
          Academic areas: comunicacion, matematica, ccss (NO cyt)
        columns:
          - name: institution_id
            description: "Institution ID"
            tests:
              - not_null
          - name: area
            description: "Academic area: comunicacion, matematica, ccss"
            tests:
              - not_null
          - name: risk_level
            description: "Predicted risk level: ALTO, MEDIO, BAJO"
          - name: confidence
            description: "Prediction confidence score [0, 1]"
          - name: predicted_success
            description: "Binary prediction: 1 = success, 0 = at risk"
