name: Run ENLA 2026 Pipeline

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'  # Diario a las 03:00 UTC (10pm Peru)
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ vars.BQ_PROJECT || 'enla-2026-callao' }}
      EMAIL_FROM: ${{ vars.EMAIL_FROM }}
      EMAIL_TO: ${{ vars.EMAIL_TO }}
   
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install deps
        run: pip install -r requirements.txt
      
      - name: DEBUG - Print all env vars (safe)
        run: |
          echo "Checking critical env vars..."
          for var in MONGODB_URI SENDGRID_API_KEY GCP_SA_KEY; do
            if [ -z "${!var}" ]; then
              echo "❌ $var is EMPTY"
            else
              echo "✅ $var is SET (length: ${#var})"
            fi
          done
          echo "GCP_PROJECT_ID: ${GCP_PROJECT_ID:-NOT SET}"
          echo "EMAIL_FROM: ${EMAIL_FROM:-NOT SET}"
          echo "EMAIL_TO: ${EMAIL_TO:-NOT SET}"
      
      - name: Run pipeline
        run: python -c "from src.etl.transform import run_etl_pipeline; run_etl_pipeline()"
