name: Test Secret
on:
  workflow_dispatch:  # Solo manual para probar

jobs:
  test-secret:
    runs-on: ubuntu-latest
    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
    steps:
      - name: Debug secret
        run: |
          echo "Testing MONGODB_URI..."
          if [ -z "$MONGODB_URI" ]; then
            echo "❌ EMPTY - Secret not injected"
            echo "Length: 0"
          else
            echo "✅ SET - Secret injected successfully"
            echo "Length: ${#MONGODB_URI}"
            echo "First 10 chars: ${MONGODB_URI:0:10}..."
          fi
