name: Test Secret Minimal
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      OTHER_SECRET: ${{ secrets.SENDGRID_API_KEY }}
      THIRD_SECRET: ${{ secrets.GCP_SA_KEY }}
      A_VAR: ${{ vars.BQ_PROJECT }}
      B_VAR: ${{ vars.EMAIL_FROM }}
      C_VAR: ${{ vars.EMAIL_TO }}
      NO_SECRET: ${{ secrets.NONEXISTENT_SECRET }}
    steps:
      - name: Check ALL
        run: |
          echo "=== SECRETS (should be SET) ==="
          [ -z "$MONGODB_URI" ] && echo "❌ MONGODB_URI EMPTY" || echo "✅ MONGODB_URI SET (len:${#MONGODB_URI})"
          [ -z "$OTHER_SECRET" ] && echo "❌ SENDGRID_API_KEY EMPTY" || echo "✅ SENDGRID_API_KEY SET (len:${#OTHER_SECRET})"
          [ -z "$THIRD_SECRET" ] && echo "❌ GCP_SA_KEY EMPTY" || echo "✅ GCP_SA_KEY SET (len:${#THIRD_SECRET})"
          echo ""
          echo "=== VARIABLES (should be SET) ==="
          [ -z "$A_VAR" ] && echo "❌ BQ_PROJECT EMPTY" || echo "✅ BQ_PROJECT SET: $A_VAR"
          [ -z "$B_VAR" ] && echo "❌ EMAIL_FROM EMPTY" || echo "✅ EMAIL_FROM SET: $B_VAR"
          [ -z "$C_VAR" ] && echo "❌ EMAIL_TO EMPTY" || echo "✅ EMAIL_TO SET: $C_VAR"
          echo ""
          echo "=== NONEXISTENT (should be EMPTY) ==="
          [ -z "$NO_SECRET" ] && echo "✅ NONEXISTENT_SECRET EMPTY (expected)" || echo "❌ UNEXPECTED: NONEXISTENT_SECRET has value"
