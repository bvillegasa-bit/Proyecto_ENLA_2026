name: Deploy dbt Models

on:
  push:
    branches: [main]
    paths: ['dbt/**']

jobs:
  dbt:
    runs-on: ubuntu-latest
    # TODO: MOVER CREDENCIALES A SECRETS - Settings → Secrets and variables → Actions → Secrets
    env:
      # Usar vars.* temporalmente - CAMBIAR A secrets.* después de mover a Secrets
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY || vars.GCP_SA_KEY }}
      BQ_PROJECT: ${{ secrets.BQ_PROJECT || vars.BQ_PROJECT || 'enla-2026-callao' }}
    steps:
      - name: Check GCP credentials
        if: ${{ env.GCP_SA_KEY != '' }}
        run: echo "GCP credentials configured"
      
      - uses: actions/checkout@v4
         
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
       
      - name: Install dbt
        run: pip install dbt-bigquery==1.5.0
       
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY || vars.GCP_SA_KEY }}
       
       - name: Configure dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          enla_callao:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: oauth
                project: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID || secrets.BQ_PROJECT || vars.BQ_PROJECT || 'enla-2026-callao' }}
                dataset: BI_ENLA
                threads: 4
                timeout_seconds: 300
                location: US
          EOF
      
      - name: Run dbt models
        working-directory: dbt
        run: |
          dbt deps
          dbt run
          dbt test
