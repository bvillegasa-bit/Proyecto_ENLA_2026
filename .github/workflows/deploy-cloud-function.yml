name: Deploy Cloud Function

on:
  push:
    branches: [main]
    paths: ['gcp/functions/**', 'src/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: secrets.GCP_SA_KEY != ''
    permissions:
      contents: read
      id-token: write
    
    steps:
      - uses: actions/checkout@v4
       
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Deploy Cloud Function
        run: |
          gcloud functions deploy enla-pipeline-orchestrator \
            --gen2 \
            --runtime=python311 \
            --entry-point=enla_pipeline_orchestrator \
            --trigger-topic=enla-raw-data-ready \
            --timeout=540s \
            --memory=512MB \
            --region=us-central1 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --set-secrets=MONGODB_URI=MONGODB_URI:latest,SENDGRID_API_KEY=SENDGRID_API_KEY:latest \
            --source=gcp/functions/enla_orchestrator/
