name: Deploy Cloud Function

on:
  push:
    branches: [main]
    paths: ['gcp/functions/**', 'src/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Environment variables at JOB level
    env:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      BQ_PROJECT: ${{ secrets.GCP_PROJECT_ID || 'enla-2026-callao' }}
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Check GCP credentials
        if: ${{ env.GCP_SA_KEY != '' }}
        run: echo "GCP credentials configured"
      
      - uses: actions/checkout@v4
       
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Debug - Check env vars
        run: |
          echo "Checking environment variables..."
          [ -z "$GCP_SA_KEY" ] && echo "GCP_SA_KEY is EMPTY" || echo "GCP_SA_KEY is SET"
          [ -z "$BQ_PROJECT" ] && echo "BQ_PROJECT is EMPTY" || echo "BQ_PROJECT is SET"
      
      - name: Deploy Cloud Function
        run: |
          gcloud functions deploy enla-pipeline-orchestrator \
            --gen2 \
            --runtime=python311 \
            --entry-point=enla_pipeline_orchestrator \
            --trigger-topic=enla-raw-data-ready \
            --timeout=540s \
            --memory=512MB \
            --region=us-central1 \
            --project=${{ secrets.GCP_PROJECT_ID || 'enla-2026-callao' }} \
            --set-secrets=MONGODB_URI=MONGODB_URI:latest,SENDGRID_API_KEY=SENDGRID_API_KEY:latest \
            --source=gcp/functions/enla_orchestrator/
