name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # Environment variables at JOB level - available to ALL steps
    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      GCP_PROJECT_ID: ${{ vars.BQ_PROJECT || secrets.GCP_PROJECT_ID || 'enla-2026-callao' }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      EMAIL_FROM: ${{ vars.EMAIL_FROM }}
      EMAIL_TO: ${{ vars.EMAIL_TO }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Debug - Check env vars
        run: |
          echo "Checking environment variables..."
          if [ -z "$MONGODB_URI" ]; then
            echo "ERROR: MONGODB_URI is EMPTY or not set"
            exit 1
          else
            echo "OK: MONGODB_URI is SET (length: ${#MONGODB_URI})"
          fi
          [ -z "$SENDGRID_API_KEY" ] && echo "SENDGRID_API_KEY is EMPTY" || echo "SENDGRID_API_KEY is SET"
          [ -z "$GCP_PROJECT_ID" ] && echo "GCP_PROJECT_ID is EMPTY" || echo "GCP_PROJECT_ID is SET"
          echo "EMAIL_FROM: ${EMAIL_FROM:-NOT SET}"
          echo "EMAIL_TO: ${EMAIL_TO:-NOT SET}"
      
      - name: Run tests with coverage
        run: |
          pytest tests/unit/ -v --cov=src --cov-report=xml --cov-report=term-missing
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
