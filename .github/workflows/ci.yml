name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests with coverage
        # TODO: Mover credenciales a Secrets en GitHub - Settings → Secrets and variables → Actions → Secrets
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI || vars.MONGODB_URI }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID || secrets.BQ_PROJECT || vars.BQ_PROJECT }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY || vars.SENDGRID_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM || vars.EMAIL_FROM || 'bernabevillegas013@gmail.com' }}
          EMAIL_TO: ${{ secrets.EMAIL_TO || vars.EMAIL_TO || 'bvillegasa@ucvvirtual.edu.pe' }}
        run: |
          pytest tests/unit/ -v --cov=src --cov-report=xml --cov-report=term-missing
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
