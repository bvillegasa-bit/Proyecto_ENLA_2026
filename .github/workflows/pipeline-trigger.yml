name: Trigger Full Pipeline

# ONE-CLICK DEPLOYMENT: This workflow runs the complete pipeline:
# 1. Python ETL (creates enla_callao_raw, fact_enla)
# 2. Feature Engineering (creates enla_callao_features)
# 3. ML Models (creates enla_callao_predictions_2026)
# 4. dbt (creates views on top of the above tables)
#
# After this workflow completes, all tables and views will be ready.
# No need to run dbt.yml separately!

on:
  workflow_dispatch:
    inputs:
      model_version:
        description: 'Model version to use'
        required: false
        default: 'v1'
      email_recipients:
        description: 'Comma-separated email recipients'
        required: false
        default: 'admin@dre-callao.gob.pe'
  
  schedule:
    # Run daily at 03:00 UTC (10:00 PM Peru)
    - cron: '0 3 * * *'

jobs:
  trigger:
    runs-on: ubuntu-latest
    # Environment variables at JOB level - available to ALL steps
    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ vars.BQ_PROJECT || 'enla-2026-callao' }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      EMAIL_FROM: ${{ vars.EMAIL_FROM }}
      EMAIL_TO: ${{ vars.EMAIL_TO }}
      BQ_PROJECT: ${{ vars.BQ_PROJECT || 'enla-2026-callao' }}
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Authenticate to Google Cloud
        if: env.GCP_SA_KEY != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
       
      - name: Debug - Check env vars (CRITICAL)
        run: |
          echo "=== CHECKING ENVIRONMENT VARIABLES ==="
          echo "MONGODB_URI length: ${#MONGODB_URI}"
          if [ -z "$MONGODB_URI" ]; then
            echo "❌ ERROR: MONGODB_URI is EMPTY or not set"
            echo "This means secrets.MONGODB_URI is not being injected"
            exit 1
          else
            echo "✅ OK: MONGODB_URI is SET (length: ${#MONGODB_URI})"
            echo "First 20 chars: ${MONGODB_URI:0:20}..."
          fi
          [ -z "$SENDGRID_API_KEY" ] && echo "⚠️ SENDGRID_API_KEY is EMPTY" || echo "✅ SENDGRID_API_KEY is SET"
          [ -z "$GCP_PROJECT_ID" ] && echo "⚠️ GCP_PROJECT_ID is EMPTY" || echo "✅ GCP_PROJECT_ID is SET (${GCP_PROJECT_ID})"
          echo "EMAIL_FROM: ${EMAIL_FROM:-NOT SET}"
          echo "EMAIL_TO: ${EMAIL_TO:-NOT SET}"
        env:
          # Explicitly pass secrets again at step level
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: Trigger Pipeline
        run: |
          python -c "
          from src.etl.transform import run_etl_pipeline
          from src.features.engineer import run_feature_pipeline
          from src.models.trainer import ModelTrainer
          from src.models.predictor import ENLAPredictor
          from src.alerting.email_alert import AlertManager
          import os
          
          # Debug: check if MongoDB URI is available
          mongodb_uri = os.environ.get('MONGODB_URI')
          if not mongodb_uri:
              print('ERROR: MONGODB_URI not found in environment')
              print('Available env vars with MONGODB:', [k for k in os.environ.keys() if 'MONGO' in k.upper()])
              raise ValueError('MONGODB_URI not provided')
          else:
              print(f'OK: MONGODB_URI found (length: {len(mongodb_uri)})')
          
          os.environ['GOOGLE_APPLICATION_CREDENTIALS'] = os.environ.get('GOOGLE_GHA_CREDS_PATH', '')
          
          # ETL
          etl_result = run_etl_pipeline()
          print(f'ETL: {etl_result.status}')
          
          # Features
          feat_result = run_feature_pipeline()
          print(f'Features: {feat_result.status}')
          
          # Models (train + predict)
          from src.database.bigquery_client import get_bq_client
          bq_client = get_bq_client()
          
          trainer = ModelTrainer(bigquery_client=bq_client, project_id=os.environ.get('GCP_PROJECT_ID'), dataset_id='BI_ENLA')
          trainer.train_all_models()
          
          predictor = ENLAPredictor(bigquery_client=bq_client, project_id=os.environ.get('GCP_PROJECT_ID'), dataset_id='BI_ENLA')
          pred_result = predictor.run_full_prediction_pipeline()
          print(f'Predictions: {pred_result.status}')
          
          # Alerts
          alerter = AlertManager(bigquery_client=bq_client, project_id=os.environ.get('GCP_PROJECT_ID'), dataset_id='BI_ENLA')
          alert_result = alerter.trigger_alerts()
          print(f'Alerts: {alert_result.status}')
          "
        env:
          # Pass critical secrets at step level too
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: Install dbt
        run: pip install dbt-bigquery==1.5.0

      - name: Configure dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
enla_callao:
  target: prod
  outputs:
    prod:
      type: bigquery
      method: oauth
      project: ${BQ_PROJECT:-enla-2026-callao}
      dataset: ${DBT_DATASET_ID:-BI_ENLA}
      threads: 4
      timeout_seconds: 300
      location: southamerica-east1
EOF
          echo "dbt profile configured with project: ${BQ_PROJECT:-enla-2026-callao}"
        env:
          BQ_PROJECT: ${{ vars.BQ_PROJECT || 'enla-2026-callao' }}
          DBT_DATASET_ID: "BI_ENLA"

      - name: Create BigQuery dataset if not exists
        run: |
          bq mk --dataset --location=southamerica-east1 ${{ vars.BQ_PROJECT || 'enla-2026-callao' }}:BI_ENLA || echo "Dataset already exists or creation skipped"
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Run dbt models
        working-directory: dbt
        env:
          BQ_PROJECT: ${{ vars.BQ_PROJECT || 'enla-2026-callao' }}
          DBT_DATASET_ID: "BI_ENLA"
        run: |
          echo "=== Running dbt after Python pipeline ==="
          echo "BQ_PROJECT: $BQ_PROJECT"
          dbt deps
          dbt debug
          dbt run
          dbt test
          echo "✅ dbt models deployed successfully!"
