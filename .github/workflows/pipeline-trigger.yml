name: Trigger Full Pipeline

# ONE-CLICK DEPLOYMENT: This workflow runs the complete pipeline:
# 1. Python ETL (creates enla_callao_raw, fact_enla)
# 2. Feature Engineering (creates enla_callao_features)
# 3. ML Models (creates enla_callao_predictions_2026)
# 4. dbt (creates views on top of the above tables)
#
# After this workflow completes, all tables and views will be ready.
# No need to run dbt.yml separately!

on:
  workflow_dispatch:
    inputs:
      model_version:
        description: 'Model version to use'
        required: false
        default: 'v1'
      email_recipients:
        description: 'Comma-separated email recipients'
        required: false
        default: 'admin@dre-callao.gob.pe'
  
  schedule:
    # Run daily at 03:00 UTC (10:00 PM Peru)
    - cron: '0 3 * * *'

jobs:
  trigger:
    runs-on: ubuntu-latest
    # Environment variables at JOB level - available to ALL steps
    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ vars.BQ_PROJECT || 'enla-2026-callao' }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      EMAIL_FROM: ${{ vars.EMAIL_FROM }}
      EMAIL_TO: ${{ vars.EMAIL_TO }}
      BQ_PROJECT: ${{ vars.BQ_PROJECT || 'enla-2026-callao' }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          # CRITICAL: Ensure we get the LATEST commit, not a cached version
          fetch-depth: 0
      
      - name: Debug - Show WHAT CODE IS ACTUALLY CHECKED OUT
        run: |
          echo "=== CRITICAL DEBUG: What version is running? ==="
          echo "Commit SHA: $(git rev-parse HEAD)"
          echo "Commit message: $(git log -1 --pretty=%B)"
          echo "Branch/Ref: ${{ github.ref }}"
          echo "Event name: ${{ github.event_name }}"
          echo ""
          echo "=== Checking if the fix is in the checked-out code ==="
          echo "Searching for 'raw_df['ID_IE']' in transform.py..."
          grep -n "raw_df\['ID_IE'\]" src/etl/transform.py && echo "✅ FIX FOUND: Code has ID_IE (uppercase)" || echo "❌ ERROR: Fix NOT found in checked-out code!"
          echo ""
          echo "=== Searching for OLD broken code (id_ie lowercase) ==="
          grep -n "raw_df\['id_ie'\]" src/etl/transform.py && echo "❌ FOUND OLD CODE: This is the bug!" || echo "✅ GOOD: No old code with lowercase id_ie"
          echo ""
          echo "=== Showing transform.py lines 345-360 (what the workflow will actually run) ==="
          cat src/etl/transform.py | head -360 | tail -20
          echo ""
          echo "=== Full git log (last 5 commits) ==="
          git log --oneline -5
          echo ""
          echo "=== CHECK THIS: If commit is OLDER than bd5a33d, you're not running latest! ==="
          echo "=== SOLUTION: Use 'Run workflow' button, NOT 'Re-run all jobs' ==="
      
      - name: Show current commit (DEBUG)
        run: |
          echo "=== GITHUB ACTIONS DEBUG INFO ==="
          git log --oneline -1
          git status
          echo "Commit SHA: $(git rev-parse HEAD)"
          echo "Branch/Ref: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Authenticate to Google Cloud
        if: env.GCP_SA_KEY != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
       
      - name: Debug - Check env vars (CRITICAL)
        run: |
          echo "=== CHECKING ENVIRONMENT VARIABLES ==="
          echo "MONGODB_URI length: ${#MONGODB_URI}"
          if [ -z "$MONGODB_URI" ]; then
            echo "❌ ERROR: MONGODB_URI is EMPTY or not set"
            echo "This means secrets.MONGODB_URI is not being injected"
            exit 1
          else
            echo "✅ OK: MONGODB_URI is SET (length: ${#MONGODB_URI})"
            echo "First 20 chars: ${MONGODB_URI:0:20}..."
          fi
          [ -z "$SENDGRID_API_KEY" ] && echo "⚠️ SENDGRID_API_KEY is EMPTY" || echo "✅ SENDGRID_API_KEY is SET"
          [ -z "$GCP_PROJECT_ID" ] && echo "⚠️ GCP_PROJECT_ID is EMPTY" || echo "✅ GCP_PROJECT_ID is SET (${GCP_PROJECT_ID})"
          echo "EMAIL_FROM: ${EMAIL_FROM:-NOT SET}"
          echo "EMAIL_TO: ${EMAIL_TO:-NOT SET}"
        env:
          # Explicitly pass secrets again at step level
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: Run ETL Pipeline
        id: etl_step
        run: |
          python -c "
          from src.etl.transform import run_etl_pipeline
          import os
          
          # Debug: check if MongoDB URI is available
          mongodb_uri = os.environ.get('MONGODB_URI')
          if not mongodb_uri:
              print('ERROR: MONGODB_URI not found in environment')
              exit(1)
          else:
              print(f'OK: MONGODB_URI found (length: {len(mongodb_uri)})')
          
          # ETL
          etl_result = run_etl_pipeline()
          print(f'ETL: {etl_result.status}')
          if etl_result.status != 'success':
              print('ERROR: ETL failed!')
              exit(1)
          "
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: Verify ETL tables exist
        run: |
          echo "Checking if ETL tables exist..."
          bq show --project_id=${BQ_PROJECT} --dataset_id=BI_ENLA enla_callao_raw || {
            echo "ERROR: enla_callao_raw table not found! ETL step may have failed."
            exit 1
          }
          bq show --project_id=${BQ_PROJECT} --dataset_id=BI_ENLA fact_enla || {
            echo "ERROR: fact_enla table not found! ETL step may have failed."
            exit 1
          }
          echo "✅ ETL tables verified"
        env:
          BQ_PROJECT: ${{ vars.BQ_PROJECT || 'enla-2026-callao' }}

      - name: Run Feature Engineering
        id: feature_step
        run: |
          python -c "
          from src.features.engineer import run_feature_pipeline
          import os
          
          # Features
          feat_result = run_feature_pipeline()
          print(f'Features: {feat_result.status}')
          if feat_result.status != 'success':
              print('ERROR: Feature engineering failed!')
              exit(1)
          "

      - name: Verify Features table exists
        run: |
          echo "Checking if enla_callao_features exists..."
          bq show --project_id=${BQ_PROJECT} --dataset_id=BI_ENLA enla_callao_features || {
            echo "ERROR: enla_callao_features table not found! Feature step may have failed."
            exit 1
          }
          echo "✅ Features table verified"
        env:
          BQ_PROJECT: ${{ vars.BQ_PROJECT || 'enla-2026-callao' }}

      - name: Run ML Training
        id: training_step
        run: |
          python -c "
          from src.models.trainer import ModelTrainer
          from src.database.bigquery_client import get_bq_client
          import os
          
          bq_client = get_bq_client()
          
          trainer = ModelTrainer(bigquery_client=bq_client, project_id=os.environ.get('GCP_PROJECT_ID'), dataset_id='BI_ENLA')
          trainer.train_all_models()
          print('Training: completed')
          "

      - name: Run ML Predictions (CRITICAL - creates enla_callao_predictions_2026)
        id: prediction_step
        run: |
          python -c "
          from src.models.predictor import ENLAPredictor
          from src.database.bigquery_client import get_bq_client
          import os
          
          bq_client = get_bq_client()
          
          predictor = ENLAPredictor(bigquery_client=bq_client, project_id=os.environ.get('GCP_PROJECT_ID'), dataset_id='BI_ENLA')
          pred_result = predictor.run_full_prediction_pipeline()
          print(f'Predictions: {pred_result.status}')
          if pred_result.status != 'success':
              print(f'ERROR: Predictions failed! Errors: {pred_result.errors}')
              exit(1)
          print('✅ Predictions completed successfully')
          "
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: Verify enla_callao_predictions_2026 exists (CRITICAL CHECK)
        run: |
          echo "========================================="
          echo "CRITICAL CHECK: Verifying predictions table"
          echo "========================================="
          bq show --project_id=${BQ_PROJECT} --dataset_id=BI_ENLA enla_callao_predictions_2026 || {
            echo "❌ ERROR: Table enla_callao_predictions_2026 NOT FOUND!"
            echo "   The ML prediction step may have failed silently."
            echo "   dbt will fail if we continue."
            echo ""
            echo "Debugging info:"
            echo "- Check if models were trained: bq ls ${BQ_PROJECT}:BI_ENLA | grep enla_model"
            echo "- Check Python logs above for prediction errors"
            exit 1
          }
          echo "✅ enla_callao_predictions_2026 table verified - proceeding to dbt"
          # Show row count for verification
          bq query --project_id=${BQ_PROJECT} --use_legacy_sql=false "SELECT COUNT(*) as row_count FROM \`${BQ_PROJECT}.BI_ENLA.enla_callao_predictions_2026\`"
        env:
          BQ_PROJECT: ${{ vars.BQ_PROJECT || 'enla-2026-callao' }}

      - name: Run Alerts (non-blocking)
        if: always()
        run: |
          python -c "
          from src.alerting.email_alert import AlertManager
          from src.database.bigquery_client import get_bq_client
          import os
          
          bq_client = get_bq_client()
          
          alerter = AlertManager(bigquery_client=bq_client, project_id=os.environ.get('GCP_PROJECT_ID'), dataset_id='BI_ENLA')
          alert_result = alerter.trigger_alerts()
          print(f'Alerts: {alert_result.status}')
          "
        continue-on-error: true
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}

      - name: Install dbt
        if: steps.prediction_step.outcome == 'success'
        run: pip install dbt-bigquery==1.5.0

      - name: Configure dbt profile
        if: steps.prediction_step.outcome == 'success'
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          enla_callao:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: oauth
                project: ${BQ_PROJECT:-enla-2026-callao}
                dataset: ${DBT_DATASET_ID:-BI_ENLA}
                threads: 4
                timeout_seconds: 300
                location: southamerica-east1
          EOF
          echo "dbt profile configured with project: ${BQ_PROJECT:-enla-2026-callao}"
        env:
          BQ_PROJECT: ${{ vars.BQ_PROJECT || 'enla-2026-callao' }}
          DBT_DATASET_ID: "BI_ENLA"

      - name: Debug - Show profiles.yml content
        if: steps.prediction_step.outcome == 'success'
        run: |
          echo "=== profiles.yml content ==="
          cat ~/.dbt/profiles.yml
          echo "=== End profiles.yml ==="

      - name: Create BigQuery dataset if not exists
        if: steps.prediction_step.outcome == 'success'
        run: |
          bq mk --dataset --location=southamerica-east1 ${{ vars.BQ_PROJECT || 'enla-2026-callao' }}:BI_ENLA || echo "Dataset already exists or creation skipped"
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Run dbt models (depends on enla_callao_predictions_2026)
        if: steps.prediction_step.outcome == 'success'
        working-directory: dbt
        env:
          BQ_PROJECT: ${{ vars.BQ_PROJECT || 'enla-2026-callao' }}
          DBT_DATASET_ID: "BI_ENLA"
        run: |
          echo "=== Running dbt after Python pipeline ==="
          echo "BQ_PROJECT: $BQ_PROJECT"
          echo "Verifying enla_callao_predictions_2026 is accessible..."
          bq query --project_id=${BQ_PROJECT} --use_legacy_sql=false "SELECT COUNT(*) as row_count FROM \`${BQ_PROJECT}.BI_ENLA.enla_callao_predictions_2026\`" || {
            echo "❌ ERROR: Cannot access enla_callao_predictions_2026!"
            echo "   dbt will fail. Aborting."
            exit 1
          }
          dbt deps
          dbt debug
          dbt run
          dbt test
          echo "✅ dbt models deployed successfully!"

      - name: Pipeline Summary
        if: always()
        run: |
          echo "========================================="
          echo "PIPELINE EXECUTION SUMMARY"
          echo "========================================="
          echo "ETL Step: ${{ steps.etl_step.outcome || 'skipped' }}"
          echo "Features Step: ${{ steps.feature_step.outcome || 'skipped' }}"
          echo "Training Step: ${{ steps.training_step.outcome || 'skipped' }}"
          echo "Prediction Step: ${{ steps.prediction_step.outcome || 'skipped' }}"
          echo "dbt Step: ${{ steps.prediction_step.outcome == 'success' && 'will run' || 'skipped (predictions failed)' }}"
          echo ""
          if [ "${{ steps.prediction_step.outcome }}" != "success" ]; then
            echo "❌ CRITICAL: Predictions table was NOT created!"
            echo "   dbt was skipped to prevent errors."
            echo "   Check the Python prediction step logs above."
          fi
