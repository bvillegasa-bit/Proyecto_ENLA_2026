name: Trigger Full Pipeline

on:
  workflow_dispatch:
    inputs:
      model_version:
        description: 'Model version to use'
        required: false
        default: 'v1'
      email_recipients:
        description: 'Comma-separated email recipients'
        required: false
        default: 'admin@dre-callao.gob.pe'
  
  schedule:
    # Run daily at 03:00 UTC (10:00 PM Peru)
    - cron: '0 3 * * *'

jobs:
  trigger:
    runs-on: ubuntu-latest
    # TODO: MOVER CREDENCIALES A SECRETS - Settings → Secrets and variables → Actions → Secrets
    # Las credenciales (MONGODB_URI, SENDGRID_API_KEY, GCP_SA_KEY) NO deben estar como Variables (visibles)
    env:
      # Usar vars.* temporalmente - CAMBIAR A secrets.* después de mover a Secrets
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY || vars.GCP_SA_KEY }}
      BQ_PROJECT: ${{ secrets.BQ_PROJECT || vars.BQ_PROJECT || 'enla-2026-callao' }}
    
    steps:
      - uses: actions/checkout@v4
       
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
       
      - name: Install dependencies
        run: pip install -r requirements.txt
       
      - name: Authenticate to Google Cloud
        if: ${{ env.GCP_SA_KEY != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Trigger Pipeline
        run: |
          python -c "
          from src.etl.transform import run_etl_pipeline
          from src.features.engineer import run_feature_pipeline
          from src.models.trainer import ModelTrainer
          from src.models.predictor import ENLAPredictor
          from src.alerting.email_alert import AlertManager
          import os
          
          os.environ['GOOGLE_APPLICATION_CREDENTIALS'] = os.environ['GOOGLE_GHA_CREDS_PATH']
          
          # ETL
          etl_result = run_etl_pipeline()
          print(f'ETL: {etl_result.status}')
          
          # Features
          feat_result = run_feature_pipeline()
          print(f'Features: {feat_result.status}')
          
          # Models (train + predict)
          from src.database.bigquery_client import get_bq_client
          bq_client = get_bq_client()
          
          trainer = ModelTrainer(bigquery_client=bq_client, project_id='${{ secrets.GCP_PROJECT_ID }}', dataset_id='BI_ENLA')
          trainer.train_all_models()
          
          predictor = ENLAPredictor(bigquery_client=bq_client, project_id='${{ secrets.GCP_PROJECT_ID }}', dataset_id='BI_ENLA')
          pred_result = predictor.run_full_prediction_pipeline()
          print(f'Predictions: {pred_result.status}')
          
          # Alerts
          alerter = AlertManager(bigquery_client=bq_client, project_id='${{ secrets.GCP_PROJECT_ID }}', dataset_id='BI_ENLA')
          alert_result = alerter.trigger_alerts()
          print(f'Alerts: {alert_result.status}')
          "
        env:
          # TODO: Cambiar a secrets.* después de mover credenciales a Secrets en GitHub
          MONGODB_URI: ${{ secrets.MONGODB_URI || vars.MONGODB_URI }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID || secrets.BQ_PROJECT || vars.BQ_PROJECT }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY || vars.SENDGRID_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM || vars.EMAIL_FROM || 'bernabevillegas013@gmail.com' }}
          EMAIL_TO: ${{ secrets.EMAIL_TO || vars.EMAIL_TO || 'bvillegasa@ucvvirtual.edu.pe' }}
