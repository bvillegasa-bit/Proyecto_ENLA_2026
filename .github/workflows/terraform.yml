name: Terraform CI/CD

on:
  push:
    branches: [main]
    paths: ['terraform/**']

permissions:
  contents: read
  id-token: write  # Required for OIDC auth to GCP

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
    defaults:
      run:
        working-directory: terraform
    
    steps:
      - name: Check GCP credentials
        if: ${{ env.GCP_SA_KEY != '' }}
        run: echo "GCP credentials configured"
      
      - uses: actions/checkout@v4
       
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.0'
       
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Terraform Init
        run: terraform init
      
      - name: Terraform Validate
        run: terraform validate
      
      - name: Terraform Plan
        run: terraform plan -input=false
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_mongodb_uri: ${{ secrets.MONGODB_URI }}
          TF_VAR_sendgrid_api_key: ${{ secrets.SENDGRID_API_KEY }}
          TF_VAR_alert_emails: '["admin@dre-callao.gob.pe"]'
      
      - name: Terraform Apply (auto-apply on main)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_mongodb_uri: ${{ secrets.MONGODB_URI }}
          TF_VAR_sendgrid_api_key: ${{ secrets.SENDGRID_API_KEY }}
          TF_VAR_alert_emails: '["admin@dre-callao.gob.pe"]'
